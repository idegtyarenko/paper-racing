<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Paper Racing</title>
    <link rel="icon" href="/paper-racing/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/paper-racing/apple-touch-icon.png" />
    <meta name="theme-color" content="#0a8a4f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Paper Racing" />
  </head>
  <body>
    <div class="app">
      <div class="app__board">
        <canvas id="board"></canvas>
        <div
          id="turnQueue"
          class="turn-queue"
          hidden
          data-i18n-aria-label="race.queueLabel"
          data-i18n-title="race.queueLabel"
          role="img"
        ></div>
        <div class="zoom-ctl" aria-hidden="true">
          <button id="zoomIn" type="button" class="zoom-ctl__btn" aria-label="Приблизить">
            ＋
          </button>
          <button id="zoomOut" type="button" class="zoom-ctl__btn" aria-label="Отдалить">
            －
          </button>
        </div>
        <button
          id="confirmMove"
          class="confirm-move"
          data-i18n="buttons.confirmMove"
          hidden
        ></button>
      </div>
      <aside class="panel">
        <header class="panel__header">
          <h1 class="panel__title" data-i18n="app.title">🏁 Paper Racing</h1>
          <button
            id="helpBtn"
            class="icon-button"
            data-i18n-aria-label="buttons.rulesTitle"
            data-i18n-title="buttons.rulesTitle"
            aria-label="Правила"
            title="Правила"
          >
            ?
          </button>
        </header>
        <div class="status"></div>
        <button
          id="skipTurn"
          class="button button--center"
          data-i18n="buttons.skipTurn"
          hidden
        ></button>
        <div id="editButtons" class="panel__group">
          <button
            id="nextBtn"
            class="button button--center"
            data-i18n="buttons.next"
            hidden
          ></button>
          <button id="backBtn" class="button button--center" data-i18n="buttons.back">
            ← Назад
          </button>
          <button
            id="joinByCode"
            class="button button--center"
            data-i18n="online.joinByCode"
          >
            🌐 Войти по коду игры
          </button>
        </div>
        <div id="modeButtons" class="panel__group" hidden>
          <button
            id="modeLocal"
            class="button button--center"
            data-i18n="modeSelect.local"
          ></button>
          <button
            id="modeOnline"
            class="button button--center"
            data-i18n="modeSelect.online"
          ></button>
          <button
            id="modeAI"
            class="button button--center"
            data-i18n="modeSelect.ai"
          ></button>
          <button
            id="modeBack"
            class="button button--center"
            data-i18n="buttons.back"
          ></button>
        </div>
        <div id="aiButtons" class="panel__group" hidden>
          <div id="aiDifficulty" class="panel__group">
            <button
              type="button"
              class="button button--center"
              data-difficulty="easy"
              data-i18n="aiSelect.easy"
            ></button>
            <button
              type="button"
              class="button button--center"
              data-difficulty="medium"
              data-i18n="aiSelect.medium"
            ></button>
            <button
              type="button"
              class="button button--center"
              data-difficulty="hard"
              data-i18n="aiSelect.hard"
            ></button>
          </div>
          <button
            id="aiSettingsBtn"
            class="button button--center"
            data-i18n="settings.open"
          ></button>
          <button
            id="aiBack"
            class="button button--center"
            data-i18n="buttons.back"
          ></button>
        </div>
        <div id="lobbyButtons" class="panel__group" hidden>
          <div class="lobby__code">
            <span class="lobby__code-label" data-i18n="online.codeLabel"></span>
            <button
              id="lobbyCode"
              type="button"
              class="lobby__code-value"
              data-i18n-title="online.codeCopied"
            >
              —
            </button>
          </div>
          <button
            id="lobbyShare"
            class="button button--center"
            data-i18n="online.share"
          ></button>
          <ul id="lobbyRoster" class="lobby__roster"></ul>
          <button
            id="lobbySettings"
            class="button button--center"
            data-i18n="settings.open"
            hidden
          ></button>
          <button
            id="lobbyStart"
            class="button button--primary"
            data-i18n="online.start"
            hidden
          ></button>
          <button
            id="lobbyLeave"
            class="button button--center"
            data-i18n="online.leave"
          ></button>
        </div>
        <div id="playersButtons" class="panel__group" hidden>
          <div id="playerCount" class="players-select">
            <button type="button" class="count-btn" data-count="2">2</button>
            <button type="button" class="count-btn" data-count="3">3</button>
            <button type="button" class="count-btn" data-count="4">4</button>
            <button type="button" class="count-btn" data-count="5">5</button>
            <button type="button" class="count-btn" data-count="6">6</button>
          </div>
          <button
            id="settingsBtn"
            class="button button--center"
            data-i18n="settings.open"
          ></button>
          <button
            id="playersBack"
            class="button button--center"
            data-i18n="buttons.back"
          ></button>
        </div>
        <div id="raceButtons" class="panel__group" hidden>
          <div class="winner">
            <div class="winner__trophy">🏆</div>
            <div class="winner__title"></div>
          </div>
          <button id="newRace" class="button" data-i18n="buttons.newRace"></button>
        </div>
      </aside>
    </div>
    <div id="overlay" class="overlay" hidden>
      <div class="overlay__backdrop"></div>
      <div id="rulesSheet" class="sheet" hidden>
        <h2 class="sheet__title" data-i18n="buttons.rulesTitle"></h2>
        <p class="rules__text" data-i18n="rules.body"></p>
        <button
          class="button button--center"
          data-i18n="buttons.toWheel"
          data-close
        ></button>
      </div>
      <div id="raceDialog" class="sheet" hidden>
        <h2 class="sheet__title" data-i18n="buttons.newRaceDialogTitle"></h2>
        <button
          id="dlgSameTrack"
          class="button button--center"
          data-i18n="buttons.sameTrack"
        ></button>
        <button
          id="dlgNewTrack"
          class="button button--center"
          data-i18n="buttons.newTrack"
        ></button>
        <button
          class="button button--center"
          data-i18n="buttons.cancel"
          data-close
        ></button>
      </div>
      <div id="settingsSheet" class="sheet" hidden>
        <h2 class="sheet__title" data-i18n="settings.title"></h2>
        <div class="setting">
          <div class="setting__labelrow">
            <span class="setting__label" data-i18n="settings.penaltyLabel"></span>
            <button
              type="button"
              class="setting__help"
              aria-expanded="false"
              data-i18n-aria-label="settings.helpLabel"
            >
              ?
            </button>
          </div>
          <p class="setting__hint" data-i18n="settings.penaltyHint" hidden></p>
          <div id="penaltyType" class="seg seg--stack">
            <button
              type="button"
              class="seg__btn"
              data-penalty="dynamic"
              data-i18n="settings.dynamic"
            ></button>
            <button
              type="button"
              class="seg__btn"
              data-penalty="static"
              data-i18n="settings.static"
            ></button>
          </div>
        </div>
        <div id="exponentRow" class="setting">
          <div class="setting__labelrow">
            <span class="setting__label" data-i18n="settings.exponentLabel"></span>
            <button
              type="button"
              class="setting__help"
              aria-expanded="false"
              data-i18n-aria-label="settings.helpLabel"
            >
              ?
            </button>
          </div>
          <p class="setting__hint" data-i18n="settings.exponentHint" hidden></p>
          <div id="exponentType" class="seg">
            <button
              type="button"
              class="seg__btn"
              data-exponent="standard"
              data-i18n="settings.exponentStandard"
            ></button>
            <button
              type="button"
              class="seg__btn"
              data-exponent="strict"
              data-i18n="settings.exponentStrict"
            ></button>
          </div>
        </div>
        <div id="staticRow" class="setting">
          <div class="setting__head">
            <div class="setting__labelrow">
              <span class="setting__label" data-i18n="settings.staticTurnsLabel"></span>
              <button
                type="button"
                class="setting__help"
                aria-expanded="false"
                data-i18n-aria-label="settings.helpLabel"
              >
                ?
              </button>
            </div>
            <span id="staticTurnsValue" class="setting__value"></span>
          </div>
          <p class="setting__hint" data-i18n="settings.staticTurnsHint" hidden></p>
          <input id="staticSlider" class="slider" type="range" min="1" max="8" step="1" />
          <div class="slider__scale"><span>1</span><span>8</span></div>
        </div>
        <div id="turnOrderRow" class="setting">
          <div class="setting__labelrow">
            <span class="setting__label" data-i18n="settings.turnOrderLabel"></span>
            <button
              type="button"
              class="setting__help"
              aria-expanded="false"
              data-i18n-aria-label="settings.helpLabel"
            >
              ?
            </button>
          </div>
          <p class="setting__hint" data-i18n="settings.turnOrderHint" hidden></p>
          <div id="turnOrderType" class="seg">
            <button
              type="button"
              class="seg__btn seg__btn--active"
              data-order="rotate"
              data-i18n="settings.orderRotate"
            ></button>
            <button
              type="button"
              class="seg__btn"
              data-order="snake"
              data-i18n="settings.orderSnake"
            ></button>
            <button
              type="button"
              class="seg__btn"
              data-order="fixed"
              data-i18n="settings.orderFixed"
            ></button>
          </div>
        </div>
        <button
          class="button button--center"
          data-i18n="settings.done"
          data-close
        ></button>
      </div>
      <div id="nameDialog" class="sheet" hidden>
        <h2 class="sheet__title" data-i18n="online.namePrompt"></h2>
        <input
          id="nameInput"
          class="field"
          type="text"
          maxlength="16"
          autocomplete="off"
          data-i18n-placeholder="online.namePlaceholder"
        />
        <button
          id="nameConfirm"
          class="button button--primary"
          data-i18n="online.create"
        ></button>
        <button
          class="button button--center"
          data-i18n="buttons.cancel"
          data-close
        ></button>
      </div>
      <div id="joinDialog" class="sheet" hidden>
        <h2 class="sheet__title" data-i18n="online.joinTitle"></h2>
        <input
          id="joinCodeInput"
          class="field field--code"
          type="text"
          maxlength="5"
          autocomplete="off"
          autocapitalize="characters"
          spellcheck="false"
          data-i18n-placeholder="online.codePlaceholder"
        />
        <input
          id="joinNameInput"
          class="field"
          type="text"
          maxlength="16"
          autocomplete="off"
          data-i18n-placeholder="online.namePlaceholder"
        />
        <div id="joinError" class="dialog-error" hidden></div>
        <button
          id="joinConfirm"
          class="button button--primary"
          data-i18n="online.joinSubmit"
        ></button>
        <button
          class="button button--center"
          data-i18n="buttons.cancel"
          data-close
        ></button>
      </div>
    </div>
    <div id="toast" class="toast" hidden></div>
    <div id="connBanner" class="conn-banner" hidden data-i18n="online.reconnecting"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
