<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Формула-1 на бумаге</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    #app { display: flex; height: 100%; font-family: system-ui, -apple-system, sans-serif; }
    #boardWrap { flex: 1; min-width: 0; background: #fbfaf4; }
    canvas { display: block; touch-action: none; user-select: none; -webkit-user-select: none; cursor: crosshair; }
    #panel {
      width: 300px; padding: 16px; background: #f4f1e8; border-left: 1px solid #d8d2c0;
      display: flex; flex-direction: column; gap: 10px; overflow-y: auto;
    }
    h1 { font-size: 20px; letter-spacing: 0.5px; }
    #status { min-height: 72px; font-size: 14px; line-height: 1.4; }
    #status.error { color: #b3261e; font-weight: 600; }
    button {
      padding: 8px 10px; font-size: 14px; cursor: pointer; text-align: left;
      border: 1px solid #b7b0a0; background: #fff; border-radius: 6px;
    }
    button:hover:not(:disabled) { background: #f0ecdf; }
    button:disabled { opacity: 0.45; cursor: default; }
    #startRace, #continueBtn { font-weight: 700; text-align: center; }
    .pinfo {
      border: 2px solid transparent; border-radius: 8px; padding: 8px 10px;
      font-size: 13px; line-height: 1.5; background: #fff;
    }
    .pinfo.active { border-color: #55524a; }
    .dot { display: inline-block; width: 11px; height: 11px; border-radius: 50%; margin-right: 5px; vertical-align: baseline; }
    .hint { font-size: 12px; color: #6b675d; line-height: 1.4; }
    .col { display: flex; flex-direction: column; gap: 10px; }
    .col[hidden] { display: none; }
  </style>
</head>
<body>
  <div id="app">
    <div id="boardWrap"><canvas id="board"></canvas></div>
    <aside id="panel">
      <h1>🏁 Формула-1</h1>
      <div id="status"></div>
      <div id="editButtons" class="col">
        <button id="startRace">Старт!</button>
        <button id="redrawOuter">↺ Перерисовать внешний край</button>
        <button id="redrawInner">↺ Перерисовать внутренний край</button>
        <button id="redrawStart">↺ Перерисовать линию старта</button>
        <p class="hint">
          Ходы: скорость меняется на ±1 клетку по каждой оси за ход.
          Вылет за трассу — пропуск двух ходов и возврат с нулевой скоростью.
          Побеждает первый, кто завершит круг.
        </p>
      </div>
      <div id="raceButtons" class="col" hidden>
        <div class="pinfo" id="p0"></div>
        <div class="pinfo" id="p1"></div>
        <button id="continueBtn">Продолжить (пропуск хода)</button>
        <button id="newRace">🔄 Новая гонка (та же трасса)</button>
        <button id="newTrack">✏️ Новая трасса</button>
      </div>
    </aside>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
