<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Paper Racing</title>
</head>
<body>
  <div class="app">
    <div class="app__board">
      <canvas id="board"></canvas>
      <button id="confirmMove" class="confirm-move" hidden>✓ Ходить</button>
    </div>
    <aside class="panel">
      <header class="panel__header">
        <h1 class="panel__title">🏁 Paper Racing</h1>
        <button id="helpBtn" class="icon-button" aria-label="Правила" title="Правила">?</button>
      </header>
      <div class="status"></div>
      <div id="editButtons" class="panel__group">
        <button id="backBtn" class="button button--center">← Назад</button>
      </div>
      <div id="playersButtons" class="panel__group" hidden>
        <div id="playerCount" class="players-select">
          <button type="button" class="count-btn" data-count="2">2</button>
          <button type="button" class="count-btn" data-count="3">3</button>
          <button type="button" class="count-btn" data-count="4">4</button>
          <button type="button" class="count-btn" data-count="5">5</button>
          <button type="button" class="count-btn" data-count="6">6</button>
        </div>
        <button id="playersBack" class="button button--center">← Назад</button>
      </div>
      <div id="raceButtons" class="panel__group" hidden>
        <div class="winner">
          <div class="winner__trophy">🏆</div>
          <div class="winner__title"></div>
        </div>
        <button id="newRace" class="button">🔄 Новая гонка</button>
      </div>
    </aside>
  </div>
  <div id="overlay" class="overlay" hidden>
    <div class="overlay__backdrop"></div>
    <div id="rulesSheet" class="sheet" hidden>
      <h2 class="sheet__title">Правила</h2>
      <p class="rules__text">
        Ходы: скорость меняется на ±1 клетку по каждой оси за ход.
        Вылет за трассу — пропуск двух ходов и возврат с нулевой скоростью.
        Побеждает первый, кто завершит круг.
      </p>
      <button class="button button--center" data-close>Понятно</button>
    </div>
    <div id="raceDialog" class="sheet" hidden>
      <h2 class="sheet__title">Новая гонка</h2>
      <button id="dlgSameTrack" class="button button--center">🔄 Та же трасса</button>
      <button id="dlgNewTrack" class="button button--center">✏️ Новая трасса</button>
      <button class="button button--center" data-close>Отмена</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
