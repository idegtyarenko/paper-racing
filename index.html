<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Формула-1 на бумаге</title>
</head>
<body>
  <div id="app" class="app">
    <div id="boardWrap" class="app__board"><canvas id="board"></canvas></div>
    <aside id="panel" class="panel">
      <h1 class="panel__title">🏁 Формула-1</h1>
      <div id="status" class="status"></div>
      <div id="editButtons" class="panel__group">
        <button id="startRace" class="button button--primary">Старт!</button>
        <button id="backBtn" class="button button--center">← Назад</button>
      </div>
      <div id="raceButtons" class="panel__group" hidden>
        <div id="winnerBanner" class="winner">
          <div class="winner__trophy">🏆</div>
          <div class="winner__title"></div>
        </div>
        <div class="player-card" id="p0"></div>
        <div class="player-card" id="p1"></div>
        <button id="newRace" class="button">🔄 Новая гонка (та же трасса)</button>
        <button id="newTrack" class="button">✏️ Новая трасса</button>
        <div class="rules">
          <h2 class="rules__title">Правила</h2>
          <p class="rules__text">
            Ходы: скорость меняется на ±1 клетку по каждой оси за ход.
            Вылет за трассу — пропуск двух ходов и возврат с нулевой скоростью.
            Побеждает первый, кто завершит круг.
          </p>
        </div>
      </div>
    </aside>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
