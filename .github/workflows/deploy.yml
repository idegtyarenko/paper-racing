name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Гейт деплоя отдельными шагами — чтобы в логах CI было видно, ЧТО упало
      # (тайпчек / тесты / сборка), а не один общий `npm run build`. Провал любого
      # шага роняет job `build` → job `deploy` (needs: build) не запускается.
      # `vite build` вместо `npm run build`, чтобы tsc/vitest не гонялись дважды.
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npx vite build
        env:
          # Онлайн-режим: значения из Settings → Secrets and variables → Actions.
          # Если секреты не заданы — сборка проходит, но онлайн-входы скрыты (только
          # локальная игра).
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v4
      - uses: actions/deploy-pages@v4
        id: deployment
